name: Release

on:
  push:
    tags:
      - "*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure x64
        run: cmake --preset x64

      - name: Build x64 Release
        run: cmake --build --preset x64-release

      - name: Configure x86
        run: cmake --preset x86

      - name: Build x86 Release
        run: cmake --build --preset x86-release

      - name: Prepare release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -Path dist -ItemType Directory -Force | Out-Null

          Copy-Item "build/x64/Release/TexThumbnailProvider.dll" "dist/TexThumbnailProvider-$tag-x64.dll"
          Copy-Item "build/x86/Release/TexThumbnailProvider.dll" "dist/TexThumbnailProvider-$tag-x86.dll"

          Get-FileHash "dist/*.dll" -Algorithm SHA256 |
            ForEach-Object {
              $name = Split-Path $_.Path -Leaf
              "{0} *{1}" -f $_.Hash.ToLowerInvariant(), $name
            } |
            Set-Content "dist/SHA256SUMS.txt"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: TexThumbnailProvider ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/TexThumbnailProvider-${{ github.ref_name }}-x64.dll
            dist/TexThumbnailProvider-${{ github.ref_name }}-x86.dll
            dist/SHA256SUMS.txt
